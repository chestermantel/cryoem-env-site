# Roadmap

A high-level map of the build — what's done, what's in progress, and the open directions to choose between. For orientation; rewrite freely as priorities move. The detailed *why* lives in `DECISION_LOG.md`, the working detail in `MVP_PLAN.md`.

> The point is to not lose the thread. Scan **Done** to remember how far it's come, **Now** for the current focus, **Next** to decide where to push.

## Done

- ✓ **Golden path** — the by-hand expert reconstruction (W1, ≈ 3.15 Å) plus a no-LLM programmatic reproduction of it.
- ✓ **Action surface — built & validated** across three task families: single-decision ×5, end-to-end (constrained tools, easy/hard), and raw `cryosparc-tools` (easy + maximally-realistic). Every end-to-end run reaches a golden-class map.
- ✓ **The core finding** — resolution alone can't rank runs (a run can hit ≈ 3.1 Å with poor decisions). This is *why* the grader exists.
- ✓ **Grader** — a two-block weighted scorecard (outcome 0.50 / procedure 0.50) with a handedness gate and degraded-map sensitivity checks; reproduces the quality gap resolution misses. (The integrity block was deleted 2026-06-24 — a strong multi-metric suite makes single-metric gaming hard; the mask-gap survives as a 0-weight diagnostic.)
- ✓ **Outcome restructured into signal quality ⊕ reference consistency (50/50)** — the run's *own* reconstruction (global resolution + FSC-curve + local-res + cFAR) paired with *held-out* agreement vs the deposited EMD-6287 map (map-to-map CC + FSC@0.5, ceiling-normalized). The map-to-model EMRinger/CC_mask block is retained as a **0-weight cross-check** (we grade map quality, not model quality), and a **divergence** diagnostic flags signal-vs-reference gaps. The held-out reference half + the handedness gate are the validated correct-vs-wrong separator (degraded suite: mirror/noise/half-density collapse). *(The earlier dock wall was bypassed by lowpass-locked map alignment.)*
- ✓ **Ground-truth correction** — the EMDB/PDB deposit (EMD-6287 + 6BDF) is the answer key; the by-hand run is demoted to a 0-weight cross-check.
- ✓ **Grading pipeline** — a `rollout → grades` front door (`grade.py`); reproduces the scorecard from committed code; the whole scheme is one declarative registry (`scoring.BLOCKS`), and the suite reference is auto-rendered (`suite.md`) so it can't drift.
- ✓ **Signal-quality compute run** — all four signal axes populated maps-only (`grader_signal.py`, no particles / cryoSPARC / Phenix): global resolution + FSC-curve AUC + windowed-FSC local resolution + 3DFSC conical-FSC cFAR, one method scoring the four runs, the by-hand W1, and the deposit. Each axis is continuous, normalized to the deposit's own value (the runs use a 20-movie subset, so the deposit leads). Merged into the outcome and re-graded (totals 0.677–0.880).
- ✓ **This site** — RFP spec, rollouts, grader, benchmark (per-run × per-subscore scoreboard), and per-run reports.

## Now — validate the suite

The active thread: confirm the metrics measure *scientific quality*, then calibrate and freeze. The pipeline *is* the validation harness — feed inputs of known quality and check the grades behave. (Deferred to compute until the scheme settles.)

- **Controlled quality ladder** — reconstruct from 5 / 10 / 20 / 40 movies + inject known-bad decisions (wrong symmetry, over-selection, tight mask); grades must move monotonically. The strongest test, and it calibrates the procedure bands.
- **Adversarial + reproducibility** — construct a wishful-mask map and confirm the held-out reference + the mask-gap diagnostic catch it; check the grade is stable under version drift. (The degraded-map suite already covers basic sensitivity.)
- **Per-decision quality layer** — grade each interactive choice against what the agent could observe (partial credit for valid alternatives). The crux of "quality beyond resolution," since outcome saturates on T20S.
- **Calibrate, then freeze** the block weights + the new outcome-subscore weights (currently flagged-for-review).

## Next — directions to choose between

Once the grader is solid, the bigger pushes — roughly independent, pick by priority:

- **Harder public instance** — extend past T20S to a tougher public EMPIAR dataset. The top design item after the grader: real difficulty headroom + a transfer split.
- **Characterize variance** — runs are single-shot and cryoSPARC is stochastic; repeat each task ~5× to grade the *distribution*, not one draw.
- **Formalize an instance family** — {dataset × start-tier × perturbation}, so tasks are sampled rather than one-off (training value).
- **Widen the action space** — hand more numerical parameters to the agent (starting with particle diameter).
- **Tier-3 Scripps data (the moat)** — the DUA-gated pipeline data behind the published paper; the phase-2 strategic direction.

## Open decisions

Worth thinking about — these shape the order above:

- Which **harder public EMPIAR** instance extends the ladder?
- When to **commit a framework** (Inspect now vs Harbor for scale) — held loosely today.
- When to start the **tier-3 / DUA** track vs keep deepening the public env?
- What's the **trigger to call the grader "done"** and freeze the weights?

## Parked on purpose

Deferred until the build itself is satisfying (this site is for my own use for now):

- **Presentation layer** — a results / map gallery, a "how it works" page, an investor/PI demo view.
- **Shippable artifact** — self-containment + licensing (Structura vs RELION) for a redistributable environment.
