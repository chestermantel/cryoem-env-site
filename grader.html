# The grader

Each subscore and exactly how it is computed. The scheme is the `scoring.BLOCKS` registry in `scoring.py` (the harness-agnostic IP); `suite.md` auto-renders from it, so it can't drift from the code. Per-run × per-subscore results: [benchmark](benchmark.html). Numbers shown here are example values from the runs; weights and bands are flagged for calibration. Rationale: `docs/grading.md`.

## Blocks and reduction

A run is reduced to one number by three weighted blocks. Each subscore returns a value in **[0, 1]** (higher = better) and a weight. The outcome block is a tree — **signal quality** ⊕ **reference consistency**, 50/50, then × the **handedness gate**. Missing data → weight 0 (the subscore drops out; it does not score zero, and it does not fabricate credit).

```
block    = Σ(value · weight) / Σ(weight)
outcome  = (signal · 0.50 + reference · 0.50) · gate     gate is multiplicative
TOTAL    = Σ(block · block_weight) / Σ(block_weight)      0.50 / 0.35 / 0.15
```

### Reference consistency — weight 0.50 (vs the deposit)

The normalizer is the **resolution-matched ceiling**: EMD-6287 is the full 2.8 Å dataset, the runs a ~3.1 Å subset, so each metric is divided by the deposit **low-passed to the run's own resolution** — never the 2.8 Å figure.

The PDB / map-to-model branch carries **0 headline weight** (the active reference is map-to-map vs the deposited map); it is computed and reported as a cross-check. The scored CC is **hand-consistent** — computed on the placed, hand-flipped map; the raw rotation-only CC is hand-blind and, because the deposit is stored in the opposite hand, scores a mirror higher than an honest run (mirror raw 0.77 > honest 0.50). The honest-run CC normalizes to ~0.37: the placed map pays an alignment-interpolation cost the in-frame ceiling does not (the 0.5 placement floor), flagged for calibration.

### Divergence

`signal − reference`, reported, never weighted. Current value ≈ **0.39** uniformly: signal is global-resolution-only (the three box-pending axes return weight 0, so signal = 1.0) and reference normalizes to ~0.37 under the placement floor. It changes once the box axes populate and the CC band is calibrated.

## How the scheme serves the RFP

The RFP asks for execution-graded environments with **named, weighted, computable subscores**, **held-out** ground truth, defenses against degenerate strategies, and a headline **below ceiling**.

- **Fairness rule.** Every reference number is recomputed by us under one engine and one procedure — for every map, including the deposit and every ceiling. The run's self-reported, mask-dependent resolution is not graded; the subset-ceiling guardrail normalizes to the deposit low-passed to each run's resolution.
- **Reward integrity.** The agent sees its own self-FSC and cryoSPARC plots; the deposited map + model and all agreement metrics are held out. Wishful masking is checked twice — held-out reference disagreement and the explicit mask-gap. Signal quality is high for any internally-consistent map (a mirror included), so it is paired 50/50 with held-out reference and capped by the gate. The reward is rule-based — no learned model, no LLM-judge.
- **Below ceiling.** Totals 0.790–0.902; outcome ~0.80, unsaturated.

| RFP requirement (quoted) | Where in the scheme |
|---|---|
| "**named, computable metric**" with "**normalization and direction**" | named subscores in `[0,1]`, higher = better, explicit normalization |
| returns "**named numeric subscores with weights**" | `score_run → {…named (value, weight)…}` |
| "how a **trajectory is reduced to a number**" | recursive weighted combination, outcome-dominated, gated |
| "guards against **degenerate strategies**"; "**visible vs held out**" | held-out reference agreement + the mask-gap term |
| "how **ground truth is established**" | the published EMD-6287 / 6BDF deposit, recomputed under one engine |
| "headline **below ceiling**" | totals < 1.0; outcome unsaturated |

Everything cryo-EM-specific (metrics, bands, weights, the three-block split) is **our** instantiation of the RFP's generic categories, not an RFP citation.

**Provisional:** signal quality is global-resolution-only until the box compute runs; the divergence and the conservative reference-CC are calibration items; all weights and bands are flagged, to be calibrated on a quality ladder then frozen; procedure and integrity get a separate refinement pass; train/test splits and an instance family are deferred for this single-instance POC.
