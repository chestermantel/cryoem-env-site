# The grader

How the grader turns a reconstruction run into one number — what it separates, how every subscore is computed, and why. It reflects the live `scoring.BLOCKS` registry (the harness-agnostic IP) and the emitted artifacts; numbers are a snapshot, weights and bands are under calibration. Rationale: `docs/grading.md`. The suite auto-renders to `suite.md`, so it can't drift from the code.

## What the grader separates

Every run reached **~3.1 Å** (3.11–3.18 Å) regardless of decision quality — so resolution can't tell a careful run from a sloppy one, let alone a correct map from a confident-but-wrong one. The grader adds the two axes resolution lacks.

**Correct vs wrong** is the headline. Within the outcome block it's **reference consistency** — held-out agreement with the deposited answer key — backstopped by the **handedness gate**. On a deliberately-degraded suite the map-to-deposit FSC blows up from ~3.5 Å to **22 Å** (mirror) and **91 Å** (half-density), and the gate independently zeroes the mirror. That is the anti-gaming guarantee.

**Careful vs sloppy** is the tie-break. The four real runs all built the correct structure and none gamed, so the outcome is near-uniform and **procedure** orders them — dropping the sloppy runs ~0.10 for over-selected templates and skipped stages. Procedure ranks honest runs; it does not guard correctness.

## How a run becomes a number

Each subscore returns a value in **[0, 1]** (higher = better) and a weight. The outcome block is a small tree — **signal quality** ⊕ **reference consistency**, 50/50, then × the **handedness gate**; blocks combine by block weight. Missing data → weight 0 (drops out, never fabricates credit).

```
block    = Σ(value · weight) / Σ(weight)
outcome  = (signal · 0.50 + reference · 0.50) · gate     gate is multiplicative
TOTAL    = Σ(block · block_weight) / Σ(block_weight)      0.50 / 0.35 / 0.15
```

Values are coarse **bands**, not exact matches — cryo-EM numbers drift across software versions, so the grader rewards the right *regime*, not a digit (`scoring.banded` / `count_band` / `ratio_to_ceiling`).

## Outcome — signal ⊕ reference (weight 0.50, × handedness gate)

Two halves, 50/50: **signal quality** scores the run's *own* reconstruction (no answer key — *"a good map of something?"*); **reference consistency** scores agreement with the deposited EMD-6287 (*"the right something?"*).

### Reference consistency — weight 0.50 (vs the deposit)

### Divergence (diagnostic, never weighted)

A large **signal − reference** gap flags, in order: a handedness flip, a wrong-structure/over-fit artifact, or — only after both are excluded and verified — genuine outperformance. The grader emits it; reweighting stays human-in-the-loop. **Now it's ≈ 0.39 uniformly — an artifact**: signal saturates at 1.0 (global-res-only) against a conservative reference CC (~0.37). It shrinks once the box axes populate and the CC band is calibrated; on T20S, outperformance of the full-data deposit is implausible anyway.

## Procedure — weight 0.35

Per-stage decision quality vs the golden *intent*, from the run's structured job-graph. It **ranks already-correct runs**, never guards correctness — graded structurally in bands against intent, never an exact-DAG match (capable agents take different valid paths). *Procedure and integrity get a separate refinement pass.*

A held-out metric must drop on a wrong map where resolution can't. On the golden map plus three degraded versions — mirror, noise, half-density — reference consistency collapses and the gate zeroes the mirror:

## How the scheme serves the RFP

The RFP wants execution-graded environments with **named, weighted, computable subscores**, **held-out** ground truth, defenses against degenerate strategies, and a headline **below ceiling**.

- **Fairness rule.** Every reference number is recomputed by us under one engine and one procedure — for every map, including the deposit and every ceiling. So we never grade a run's self-reported, mask-dependent resolution, and the subset-ceiling guardrail normalizes to the deposit low-passed to each run's resolution (never the 2.8 Å figure).
- **Reward integrity.** The agent sees its own self-FSC and cryoSPARC plots; the deposited map + model and all agreement metrics are held out. Wishful masking is caught twice — held-out reference disagreement *and* the explicit mask-gap. Signal quality is high for *any* internally-consistent map (a mirror included), which is exactly why it's paired 50/50 with held-out reference and capped by the gate. The core reward is rule-based, no learned model or LLM-judge.
- **Difficulty & headroom.** Outcome ~0.80 (not saturated); totals 0.790–0.902, below ceiling. The spread lives in scientific judgment and correctness, not in the scalar.

| RFP requirement (quoted) | How this grader satisfies it |
|---|---|
| "**named, computable metric**" with "**normalization and direction**" | named subscores in `[0,1]`, higher = better, explicit normalization |
| returns "**named numeric subscores with weights**" | `score_run → {…named (value, weight)…}` |
| "how a **trajectory is reduced to a number**" | recursive weighted combination, outcome-dominated, gated |
| "guards against **degenerate strategies**"; "**visible vs held out**" | held-out reference agreement + the mask-gap term |
| "how **ground truth is established**" | the published EMD-6287 / 6BDF deposit, recomputed under one engine |
| "headline **below ceiling**" | totals < 1.0; outcome unsaturated; discrimination validated |
| "what **bad performance** looks like" | procedure exposes over-selection / skipped stages; outcome catches wrong maps |

Everything cryo-EM-specific (metrics, bands, weights, the three-block split) is **our** instantiation of the RFP's generic categories, not an RFP citation.

**Provisional:** signal quality is global-resolution-only until the box compute runs; the divergence and the conservative reference-CC are calibration artifacts; all weights and bands are flagged, to be calibrated on the quality ladder then frozen; procedure/integrity get a separate pass; train/test splits and an instance family are deferred for this single-instance POC.
