# Grading the reconstruction task

How each cryoSPARC run is reduced to one score — the named subscores, exactly how each is computed, and how they combine.

## Overview

Single-particle cryo-EM turns hundreds of thousands of noisy movie frames of a frozen protein into a three-dimensional density map. Getting there is a long, judgment-heavy workflow: align and average the movies, estimate each micrograph's defocus, pick particles out of the noise, sort them into 2-D classes, throw out the junk, build an initial 3-D model, and refine it to high resolution. Most steps carry decisions an expert makes by eye and by experience, and a poor call early silently caps the quality of everything downstream. Our goal is to measure how well an AI agent runs that entire loop — not whether it can answer questions about cryo-EM, but whether it can drive a real reconstruction to an expert-quality result. We build a containerized environment in which the agent operates a live cryoSPARC pipeline end to end, and a grader that scores the run against deposited ground truth using computed metrics rather than human judgment.

The proving ground is **T20S**, the 20S proteasome (EMPIAR-10025): the standard public cryoSPARC tutorial dataset, with a published map and atomic model (EMD-6287 / PDB 6BDF) to grade against. T20S lets us build and validate every piece — the agent's action space, the reconstruction rollouts, and each grader metric — against a known, public answer key. It is also deliberately easy: the particle is small, highly symmetric, and well-behaved; the tutorial hands the agent several decisions that are genuinely hard in real work; and the final resolution saturates, so most honest runs land in nearly the same place. T20S is a precursor to the dataset the pilot targets — research-grade data from the Ward lab at Scripps, where the reconstruction is materially harder, the right decisions are not given, and the same grading machinery has real room to separate good science from bad. The [Next phase](next-phase.html) page details that scale-up.

## The two reward families

A run is scored on two families of reward, weighted equally:

- **Outcome — is the map good, and is it correct?** One half judges the reconstruction on its own terms — resolution and how evenly it is resolved, with no answer key. The other half checks the map against the deposited structure. A mirror-image map can look excellent yet be biologically wrong, so the whole family is gated by a handedness check that caps it to zero when the hand is inverted.
- **Procedure — were the decisions sound?** Independent of the final number: did the agent build a complete, correctly-ordered pipeline, keep a sensible set of 2-D classes, and pick particles well? This is where resolution-blind mistakes surface — a run can reach a good resolution off the back of poor decisions, and procedure is what tells those runs apart.

Each family is built from named subscores, every one a value in **[0, 1]** with a fixed direction (higher = better). The next two sections define them; the last shows the roll-up.

## Outcome subscores

Outcome has two halves of equal weight. **Signal quality** scores the run's own reconstruction with no reference; **reference consistency** scores its agreement with the deposited map. The combined block is then multiplied by the handedness gate.

### Signal quality — no reference

Four axes read from the run's own two half-maps and final volume: the overall resolution, plus three orthogonal views of how that resolution varies — across frequency, across space, and across direction. Each is normalized on a fixed scale between a **floor** (a minimal pipeline run with random interactive decisions on the same movies — no decision skill) and a **ceiling** (an expert's by-hand reconstruction of the same movies — 1.0). Both ends use the same 20-movie subset, so the axis isolates technique, not how much data was available.

| Subscore | Wt | What it is · how it's computed | In the runs |
|---|---|---|---|
| **global resolution** | 0.40 | The map's overall resolution — gold-standard half-map FSC at the 0.143 threshold. Floor-to-ceiling normalized (lower Å = better). | 3.1–3.2 Å → ~1.0 |
| **FSC-curve shape** | 0.20 | How much signal is present across *all* frequencies, not just at the cutoff — the area under the half-map FSC curve. | AUC 0.79–0.81 → 1.0 (≥ W1) |
| **local-resolution spread** | 0.20 | How uniform resolution is across the map — the 5–95% spread of a local-resolution map (tighter = better). | spread 0.73–0.80 Å → 1.0 (tighter than W1's 0.85) |
| **anisotropy** | 0.20 | How directionally even the resolution is — cFAR, a conical-FSC area ratio (1.0 = isotropic). T20S is near-isotropic, so this axis has little range here. | cFAR 0.93–0.94 → 0.95–1.0 |

**Validated, and saturating** (`runs/agent/grader/validation.md`). Across the deposit, the runs/W1, and the floor, every axis tracks known quality and separates good from bad by **4.5–21.5× the run-to-run noise** — these are effective quality measures. But the four honest runs land at signal **0.98–1.00** (all at the W1 expert ceiling) and the floor at **0.000**: on this easy, saturating target the runs are outcome-indistinguishable, and outcome is decoupled from decision quality (the run with the worst procedure has the best signal). **Agent performance cannot be discerned by outcome quality at this stage** — the ranking comes from procedure, or from a harder instance where decisions change the achievable map.

### Reference consistency — vs the deposited map

Agreement with the deposited EMD-6287 map, two subscores of equal weight. The deposit is the *full* dataset at 2.8 Å; the runs use a 20-movie subset reaching ~3.1 Å. Scoring a subset run against the full-data figure would penalize it for a data limit it did not choose — so each metric is normalized to a **resolution-matched ceiling**: the deposit low-passed to the run's own resolution, i.e. the best achievable at that resolution.

A second branch compares the map to the deposited **atomic model** 6BDF — side-chain register, masked CC, and map–model FSC. We grade *map* quality, not model quality, so it carries **no headline weight**; it is computed and reported as a cross-check.

### The handedness gate

Cryo-EM maps have an intrinsic hand; a mirror-image (enantiomer) map can have excellent resolution and internal consistency yet be the wrong structure. The gate aligns both the run map and its mirror to the reference: if the mirror fits clearly better, the outcome family is multiplied by **0**; an ambiguous case is capped at 0.6; a clear right hand passes at 1.0.

We also report **divergence** = signal − reference as a diagnostic, never folded into the score. A large gap flags a handedness flip, over-fitting, or — only after verification — genuine outperformance.

## Procedure subscores

Three subscores capture decision quality, weighted **50 / 25 / 25**. Trajectory carries the most weight: the 2-D and picking steps are visual tasks a dedicated vision model would largely saturate, whereas building a sound long-horizon plan is the thing most worth measuring.

| Subscore | Wt | What it is · how it's computed | In the runs |
|---|---|---|---|
| **trajectory** | 0.50 | *Completeness* (0.70): is the job graph the agent built and ran a complete, correctly-ordered pipeline? Every job maps to a logical capability (any picker → "pick", any refinement → "refine-3D"), so a different-but-valid pipeline passes; scored as a hard gate (a completed 3-D refinement reachable from import must exist) × (0.7 · capability coverage + 0.3 · ordering). *Reference similarity* (0.30): how closely the agent's set of jobs matched the tutorial recipe — the one place we compare against the literal reference tree. | completeness 1.0; similarity 0.63–1.0 |
| **select-2D** | 0.25 | *Templates* (0.50): how many 2-D classes the agent kept to seed template picking — the tutorial keeps ~2; over-selecting (14, 29) is a high-signal error resolution misses; banded on distance from 2. *Refine* (0.50): how well the agent's keep/reject of classes for refinement tracks an independent class-quality model — *awaits a box-side compute, shown n/a*. | templates: 2 → 1.0; 14, 29 → 0.0 |
| **particle picks** | 0.25 | F2 agreement between the agent's final particle coordinates and the golden coordinates on the same micrographs (recall-weighted, the cryo-EM convention). *Awaits a box-side compute, shown n/a.* | n/a |

When a subscore isn't computed yet, it drops out and its siblings carry the weight — no fabricated credit.

## Combining the subscores into one score

Each subscore is a value in [0, 1]. Within a family, subscores combine into a weighted average; a subscore with no data drops out and its siblings absorb its weight, so a not-yet-computed metric never silently scores zero or full credit. Outcome's two halves (signal and reference) average 50/50 and are then multiplied by the handedness gate. The two families average 50/50 to give the run's total.

Worked, on one end-to-end run (e2e_easy): signal 0.979 and reference 0.616 average to 0.798; the gate is 1.0, so outcome = 0.798. Procedure = 0.942. Total = 0.5 · 0.798 + 0.5 · 0.942 = **0.870**.

Across the four MVP runs the totals span **0.68–0.88**. Outcome sits near 0.76 for all of them — on a dataset this easy every honest run reconstructs the correct structure, so the held-out reference and the gate are what separate a correct map from a wrong one (a mirror or a noise-injected map collapses here), while procedure carries the spread among the honest runs. Per-run results for every subscore are on the [benchmark](benchmark.html) page.

## Design principles

The grader is built to the same bar the environment is meant to meet:

- **Held-out ground truth.** The deposited map and model, and every agreement metric, are withheld from the agent; it sees only its own reconstruction's self-reported statistics.
- **Hard to game.** Signal quality alone is high for any internally-consistent map — a mirror included — so it is always paired with held-out agreement and capped by the handedness gate. An over-tight "wishful" mask is caught twice: by disagreement with the held-out reference, and by a reported mask-over-fit gap.
- **Computed, not judged.** Every score is a rule-based computation against references we recompute ourselves under one engine — no learned reward model, no model-as-judge.
- **Fair, and below ceiling.** Subset runs are normalized to what is achievable at their own resolution, never the full-dataset figure; totals sit below 1.0, and the headline is unsaturated.

Weights and bands are **provisional** — flagged for calibration on a controlled quality ladder (reconstructions from 5 / 10 / 20 / 40 movies plus injected known-bad decisions), then frozen. The two procedure subscores awaiting a box-side compute are shown n/a rather than filled.
