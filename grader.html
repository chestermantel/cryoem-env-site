# The grader

How the grader turns a whole reconstruction run into one number — what it separates, the exact computation of every subscore, and why each is built the way it is. Everything below reflects the current `src/recon_env/scoring.py` (the harness-agnostic IP) and the live, emitted artifacts; the numbers are a snapshot and the weights/bands are under active calibration.

The scheme **is** one declarative registry, `scoring.BLOCKS` — adding or reweighting a metric is a single edit there. A run is graded by the `recon_env.grade` pipeline (a rollout manifest → `grades.json` + `scorecard.md`), and that exact suite is auto-rendered to `runs/agent/grader/suite.md` so the documentation can't drift from the code.

## What the grader separates

Every run we collected reached **~3.1 Å** loose-mask resolution — 3.11 to 3.18 Å — despite materially different decision quality. So **resolution cannot tell a careful run from a sloppy one**, and it certainly can't tell a *correct* reconstruction from a wrong-but-confident one. The grader exists to add the two axes resolution lacks.

The most important one is **held-out structural agreement** — the *outcome* block. It is what actually separates a correct reconstruction from a degenerate or gamed one. We proved this on a deliberately-degraded suite (mirror / heavy-noise / half-density maps): the held-out map-to-model metrics **collapse** on a wrong map exactly where resolution can't see the problem — a wrong-hand mirror drops EMRinger from 1.7 to **0.16** and map-model CC from 0.74 to **0.13**. That is the anti-gaming guarantee, and it is the grader's headline contribution.

The four real rollouts are a different situation: they **all reconstructed the correct structure and none gamed**, so the outcome block is near-saturated and nearly flat across them (the honest, uniform subset-vs-full-data interpretability gap). Among those already-correct runs, the **procedure** block breaks the tie — it drops the sloppy runs (over-selected 2D templates, skipped or failed stages) ~0.10 below the clean ones. Procedure ranks *honest* runs; it is **not** what guards correctness, and its block weights are still flagged for calibration.

## How a run becomes a number

Each subscore returns a value in **[0, 1]** (normalized so **higher = better**) and a weight. Within a block, subscores are combined by a weighted mean; the outcome block is then multiplied by the **handedness gate**; finally the blocks are combined by their block weights. A subscore whose input is missing returns **weight 0** — it doesn't fabricate credit — and a block with no data drops out of the total entirely rather than dragging it toward 0.

```
block_score   = Σ(value · weight) / Σ(weight)            within a block; weight-0 subscores drop out
outcome_block = block_score(outcome) · handedness_gate   the gate is multiplicative, not additive
TOTAL         = Σ(block_score · block_weight) / Σ(block_weight)   over blocks that have any data
```

## Outcome block — weight 0.50 (× handedness gate)

Held-out structural agreement against the **deposited ground truth** — PDB **6BDF** (the atomic model) and EMD-**6287** (the published map). The agent never sees these; they are the answer key. The three **primary** signals compare the run map to the fixed 6BDF model; two **supporting** signals add an independent map and an honest resolution. A multiplicative **handedness gate** caps the whole block.

The fairness move that makes this comparison legitimate is the **resolution-matched ceiling**. EMD-6287 is the *full* dataset at 2.8 Å; our runs are a 20-movie subset at ~3.1 Å. Scoring a subset map against the full-data deposit would penalize it for data it was never given. So each metric is normalized to the **deposit low-passed to the run's own resolution** — a true upper bound at that resolution — not to the 2.8 Å figure.

## Procedure block — weight 0.35

Per-stage decision quality vs the golden *intent*, computed from the run's structured job-graph fields. This block does **not** guard correctness (the outcome block does) — its job is to **rank already-correct runs** by the quality of the judgment calls a scientist actually makes, which resolution conceals. Grading is **structural / banded against intent, never an exact-DAG match** — capable agents reach the goal via different valid pipelines.

## Does the grader discriminate?

The point of a held-out outcome metric is that it must drop on a wrong map where resolution can't. We checked this on the golden map plus three deliberately-degraded versions — a wrong-hand **mirror**, **heavy noise**, and **half-density** (`runs/agent/grader/validation.md`):

| Map | EMRinger | →norm | CC_mask | →norm | FSC@0.5 Å | hand-gate |
|---|---|---|---|---|---|---|
| golden | 1.73 | 0.408 | 0.742 | 0.839 | 3.35 | 1.00 |
| _the four real runs_ | 1.53–1.71 | 0.37–0.40 | 0.74 | 0.84 | 3.34–3.35 | 1.00 |
| degraded_mirror | **0.16** | **0.037** | **0.130** | **0.147** | **23.64** | **0.00** |
| degraded_noise | 1.33 | 0.313 | 0.681 | 0.770 | 3.62 | 1.00 |
| degraded_halfdensity | 0.76 | 0.178 | 0.421 | 0.476 | **48.48** | 1.00 |

A wrong-structure map cannot place the known model into real side-chain density, so the held-out block catches it: the mirror collapses on **every** map-model metric and is independently zeroed by the gate; half-density and noise drop in proportion to the damage. This is the discrimination resolution alone cannot provide, and it is why the outcome block is the grader's headline — even though, on the four genuinely-good runs, it is procedure that orders them.

## Each subscore in depth

What each subscore measures, the exact computation (with the literal bands from `scoring.py`), why it is built that way, and what good vs. bad looks like in the real runs.

### map_model_cc — primary outcome (weight 1.0)
**Measures.** Real-space correlation between the deposited atomic model (6BDF, held rigid) and the agent's density map, inside a mask around the model (`phenix.map_model_cc`). The gold-standard "is the map *right*, atom for atom" question.
**Scored.** `value ÷ ceiling`, where ceiling is the same 6BDF vs the deposit low-passed to this run's resolution; then re-baselined so the bulk-envelope floor (ratio 0.5 — what even a featureless blob earns) maps to 0: `(r − 0.5) / 0.5`, clamped to [0,1].
**Why.** It is **orthogonal to resolution** — a map can hit a resolution number yet not match the real structure — which is exactly the discriminator resolution lacks. It is **held out** (the agent never sees 6BDF), making it the anti-gaming anchor.
**In the runs.** Raw 0.744 → ratio 0.84 → subscore **0.68**; uniform across the four. The mirror drops to 0.13.

### interpretability (EMRinger) — interpretability bar (weight 0.9)
**Measures.** The fraction of side chains whose density peak sits in the correct rotameric position (Barad et al., *Nat. Methods* 2015), vs 6BDF.
**Scored.** `value ÷ ceiling` (resolution-matched), floor 0. Falls back to absolute Barad bands (≥2.0 → 1.0, 1.5–2.0 → 0.85, 1.0–1.5 → 0.65, 0.5–1.0 → 0.35, else 0.1) only if no ceiling is supplied.
**Why.** Where CC_mask asks "is the backbone envelope right," EMRinger asks the harder, more useful question — **does the map resolve side chains in register** — the thing a model-builder actually needs. It is the **single strongest detector of a wrong-hand or wishfully-masked map**: in those cases side chains fall into mirror-image or empty density and the score collapses even when resolution looks fine.
**In the runs.** 1.53–1.71 raw → ~0.40 normalized; the honest, uniform subset-vs-full-data gap. Mirror 0.16 → 0.037; half-density 0.76 → 0.178. The normalized ~0.40 is also conservative (the run maps are unsharpened while the ceiling is the sharp deposit truncated) — fair for *ranking* because every run is treated identically.

### map_model_fsc@0.5 — cross-frequency agreement (weight 0.8)
**Measures.** The resolution shell at which the map-vs-model Fourier Shell Correlation crosses 0.5 (`phenix.mtriage`, map + model).
**Scored.** Lower Å is better, so `ceiling ÷ value`, clamped to [0,1].
**Why.** It checks that map-model agreement holds *across spatial frequencies*, not just in aggregate, and catches a map whose agreement decays faster than its nominal resolution implies.
**In the runs.** 3.34–3.35 Å → ~0.90 normalized. The mirror and half-density maps blow up to 23.6 and 48.5 Å — the FSC never reaches 0.5 against the true model.

### deposited_agreement (CC vs EMD-6287) — supporting cross-check (weight 0.5)
**Measures.** Map-to-map correlation against the *published density map* itself (not the model, not the in-house human run).
**Scored.** `value ÷ ceiling` (the golden-vs-deposited CC, ~0.50 — resolution-limited because the deposit is full-data), floor 0.5.
**Why.** It corroborates the model-based metrics against an independent reference on the same molecule. It is **hand-blind** — a mirror map can correlate well — so it is explicitly guarded by the handedness gate, and carries a lower weight as a supporting signal.
**In the runs.** Normalized 0.96–1.00 across the four.

### fair_resolution (GSFSC@0.143) — honest resolution (weight 0.3)
**Measures.** The half-map gold-standard FSC@0.143, recomputed by us under one fixed mask rather than taken from the run's self-reported, mask-dependent value.
**Scored.** Banded on Δ = (our resolution − the W1 anchor, 3.15 Å): Δ ≤ 0.15 → 1.0; ≤ 0.4 → 0.8; ≤ 0.8 → 0.55; ≤ 1.5 → 0.3; else 0.1. Banded against the **same-subset** W1 golden, never the 2.8 Å full-data figure.
**Why.** Its weight is deliberately low: this is precisely the metric that already *can't* rank the runs — it is kept only so a genuinely worse-resolution run is still caught.
**In the runs.** 1.00 for all four (all within band of 3.15 Å).

### handedness — the gate (multiplicative)
**Measures.** Whether the reconstruction emerged in the wrong hand (enantiomer) — a wrong structure even at perfect resolution.
**Scored.** Compares the run map's CC to W1 against its mirror's CC to W1: mirror > cc + 0.05 → **0.0**; within 0.02 → 0.6; else 1.0. Multiplies the entire outcome block.
**Why.** Because map-to-map correlation is hand-blind, a mirror map can score well on agreement; the gate prevents that from being rewarded. It is multiplicative, not additive, because handedness is a **correctness precondition**, not a quality dimension.
**In the runs.** 1.00 for all four; the deliberately-mirrored map drives it to 0.0. The grader applies a *fixed* global hand convention to every map, so a genuinely wrong-hand map double-reflects into mirror density and EMRinger collapses too — the gate and EMRinger catch it independently.

### select2d_templates — the highest-signal procedure subscore (weight 1.0)
**Measures.** How many 2D class averages the agent kept to seed the template picker.
**Scored.** `count_band` on |n − 2|: 0 → 1.0; ≤1 → 0.85; ≤3 → 0.55; ≤6 → 0.30; ≤11 → 0.12; else 0 (the ladder diagram above).
**Why.** The right answer is ~2 — one per distinct dominant view (a top/ring and a side/barrel for the D7 barrel) — giving the picker clean, non-redundant references. Keeping 14 or 29 pulls in redundant, lower-quality classes; it is the single highest-signal procedural error resolution misses, so it carries the top weight and bands steeply.
**In the runs.** raw_easy/e2e_easy n=2 → **1.0**; realistic n=14 and hard n=29 → **0.0**.

### select2d_refine — final-stack curation (weight 1.0)
**Measures.** How many of the 50 classes the agent kept for the final particle stack.
**Scored.** `count_band` on |n − 15|: ≤3 → 1.0; ≤5 → 0.80; ≤8 → 0.60; ≤12 → 0.40; else 0.20.
**Why.** A softer judgment than the template pass ("keep the good classes"), so it bands with wider tolerance.
**In the runs.** hard 15 → 1.0; raw_easy 16 → 1.0; easy/realistic 19 → 0.80.

### symmetry — recognizing the molecule (weight 1.0)
**Measures.** The point group imposed at refinement, and whether ab-initio correctly stayed C1.
**Scored.** refine = D7 → 1.0; C7/D14 (right order, wrong type) → 0.5; C1/none → 0.0; else 0.2. Multiplied by 0.8 if ab-initio imposed symmetry (it should be C1 — imposing it early gives the answer away).
**Why.** T20S has **D7** symmetry — 14 asymmetric units per particle — and imposing it at refinement multiplies the effective particle count and the achievable resolution; it is a core structural judgment.
**In the runs.** All four imposed D7 at refine → **1.0**.

### box_size — extraction geometry (weight 0.6)
**Measures.** The final particle-extraction box (golden 440 px ≈ 289 Å at 0.6575 Å/px, ~2× the particle).
**Scored.** Banded: 420–460 → 1.0; 360–520 → 0.8; 256–640 → 0.5; else 0.2. Multiplied by 0.9 if an intermediate extract was binned.
**Why.** A box too small clips the particle and its delocalized CTF signal; binning an intermediate extract feeds half-resolution particles into 2D classification — defensible but a quality smell, hence the small multiplier.
**In the runs.** All four at 440 → 1.0 (the realistic run's binned intermediate-extract carries the 0.9 multiplier on the box term).

### picker_diameters — particle-size sanity (weight 0.4)
**Measures.** The blob and template picker diameter settings.
**Scored.** blob in [60–160] & [150–260] Å → 1.0 else 0.4; template in [140–240] Å → 1.0 else 0.4; averaged.
**Why.** These are largely given by the tutorial, so this is a low-weight sanity check that the agent used a physically reasonable particle size (T20S ~150–200 Å).
**In the runs.** All four passed → 1.0.

### stage_completeness — pipeline polish (weight 0.7)
**Measures.** Which recommended polish stages were present and completed.
**Scored.** Share of: denoise (0.15), junk-detect (0.10), mask-gen (0.25), validation (0.25), sharpen (0.10), two inspect passes (0.15). A **completed** stage earns its full share; a **failed** stage earns 0.3× its share (worse than a clean skip); absent → 0.
**Why.** These stages are *defensible to skip* — a capable agent can reach a good map without denoise — so this is a soft nudge, not a gate. Attempting a step and breaking it is worse than deciding not to do it.
**In the runs.** raw_easy/e2e_easy 1.00; realistic 0.47 (no denoise, mask-gen failed); hard 0.25 (skipped denoise and mask-gen).

### curation — junk rejection (weight 0.7, or 0 with no cut data)
**Measures.** The NCC threshold chosen at each Inspect-Picks cut (the histogram above).
**Scored.** Per cut, banded on NCC: 0.35–0.55 → 1.0; 0.30–0.65 → 0.7; 0.20–0.75 → 0.4; else 0.2; averaged over the cuts present. Weight drops to 0 when no cut data is available.
**Why.** Too-loose thresholds let junk particles through and silently degrade the stack (hard cut at 0.25, realistic at 0.30, vs the ~0.41 auto-calibrated example).
**In the runs.** e2e_easy 1.00; realistic 0.85; hard 0.70; raw_easy has no structured cut data → weight 0 (drops out).

### trajectory — curation-chain shape (weight 0.6, or 0 with no count)
**Measures.** The final particle-stack size relative to the golden shape (~9.5k).
**Scored.** Banded on the ratio to golden 9519: 0.85–1.25 → 1.0; 0.65–1.6 → 0.75; 0.4–2.2 → 0.45; else 0.2.
**Why.** A stack that collapses to far fewer or balloons to far more signals a broken curation chain. Graded on *shape*, never exact counts (which drift with software version).
**In the runs.** raw_easy/realistic 1.00; e2e_easy and hard have no reliable final count → weight 0.

### overfit_gap — the integrity term (weight 0.5)
**Measures.** The spread between the no-mask and tight-mask GSFSC (the mask-gap diagram above).
**Scored.** gap = no-mask − tight-mask (Å): < 0.7 → 1.0; 0.7–0.9 → 0.8; 0.9–1.2 → 0.55; else 0.3.
**Why.** The computable defense against **wishful masking** — inflating self-reported resolution with a too-tight mask. A clean reconstruction's masked and unmasked curves track; a wishfully-masked one shows a large gap. Because it is a within-run, same-engine comparison, the *gap* is fair across runs even though absolute numbers aren't.
**In the runs.** ~0.6 Å gap for all four → 1.0.

### structure_agreement (CC vs W1) — the demoted cross-check (weight 0)
**Measures.** Map-to-map correlation against the in-house W1 by-hand reconstruction — "did the agent reconstruct what the human did on the same data."
**Why 0 weight.** Informative, but **not** ground truth: W1 is one human trajectory, not the published answer key. It was demoted to a reported cross-check on 2026-06-22 when the deposited 6BDF/EMD-6287 became the outcome reference. It still feeds the handedness gate.
**In the runs.** 0.95–0.97 across the four.

## How the scheme serves the RFP

The RFP asks for execution-graded environments with **named, weighted, computable subscores**, **held-out** ground truth, defenses against degenerate strategies, and a headline that sits **below ceiling**.

### The fairness rule
Every outcome number is recomputed by us under **one engine and one procedure, for every map — including the deposited reference**. We never compare a number we computed against a number cryoSPARC or a paper printed (different masking/FSC conventions silently bias it). Two consequences: a run's self-reported, mask-dependent resolution is not what we grade on; and the **subset-ceiling guardrail** normalizes outcome to the deposit low-passed to each run's own resolution, banding resolution against the same-subset W1 (3.15 Å), never the full-data 2.8 Å — so a subset run is never penalized for the data it wasn't given.

### Reward integrity (anti-gaming)
- **Visible to the agent during the run:** its own self half-map FSC, the cryoSPARC plots, intermediate counts — everything a working scientist legitimately sees.
- **Held out for scoring:** the deposited 6BDF model + EMD-6287 map and every agreement metric computed against them. The agent never reads the answer key.
- **The main gaming vector — wishful masking — is caught two ways:** the held-out map-model metrics (EMRinger especially) disagree with a wishfully-masked map even when its self-FSC looks great, and the explicit mask-gap integrity term flags the inflation directly.
- The core reward is **rule-based and computable** — no learned reward model, no LLM-judge (both gameable). An LLM-judge could only ever be a separate, optional QC signal.

### Difficulty & headroom
With the map-model metrics live, the outcome block sits at **~0.73**, not saturated — genuine headroom, driven by the honest subset-vs-full-data interpretability gap. The headline totals (0.748–0.863) sit meaningfully below ceiling, as the RFP requires. The grader's *discrimination* is real and validated: the held-out outcome block separates correct reconstructions from wrong/gamed ones (the degraded suite), and the procedure block separates careful runs from sloppy ones among the honest set. The spread lives in scientific judgment and correctness, not in the final scalar.

### RFP traceability

| RFP requirement (quoted) | How this grader satisfies it |
|---|---|
| "three to six signals … each a **named, computable metric**" with "**normalization and direction**" | named subscores in `[0,1]`, higher = better, with explicit normalization (the blocks above) |
| "a grading function that returns **named numeric subscores with weights**" | `score_run → {block: {name: (value, weight)}}` (the `scoring.py` contract) |
| "how a **full interaction trajectory is reduced to a number**" | weighted combination of blocks, outcome-dominated, handedness-gated (How a run becomes a number) |
| "guards against **trivial or degenerate strategies**"; "**visible … versus held out**" | held-out deposited-agreement outcome + the mask-gap integrity term (Reward integrity) |
| "how **ground truth is established** … measurement model" | the published, validated EMD-6287 / 6BDF deposit, recomputed under one engine (The fairness rule) |
| "headline score should **sit meaningfully below ceiling**" | total well below 1.0; outcome unsaturated, discrimination validated on the degraded suite |
| "what **bad performance** looks like" | the procedure subscores expose over-selection, skipped/failed stages, under-curation; the outcome block catches wrong/gamed maps |

Everything cryo-EM-specific here (the metrics, the bands, the weights, the outcome/procedure/integrity split) is **our** instantiation of the RFP's generic categories, not an RFP citation.

### What's provisional
- **Block weights (0.50 / 0.35 / 0.15) and every band** are explicit but flagged for review — to be calibrated on the degraded-map / quality ladder, then frozen.
- **Train/test splits and a parameterized instance family** are deferred for this single-instance T20S POC.
- **cFAR / anisotropy** is an optional QC signal, weak on the near-isotropic D7 T20S; revisit for lower-symmetry instances.
