# The grader

Each subscore and exactly how it is computed. The scheme is the `scoring.BLOCKS` registry in `scoring.py` (the harness-agnostic scoring module); `suite.md` auto-renders from it, so it can't drift from the code. Per-run × per-subscore results: [benchmark](benchmark.html). Numbers shown here are example values from the runs; weights and bands are flagged for calibration. Rationale: `docs/grading.md`.

## Blocks and reduction

A run is reduced to one number by two weighted blocks. Each subscore returns a value in **[0, 1]** (higher = better) and a weight. The outcome block is a tree — **signal quality** ⊕ **reference consistency**, 50/50, then × the **handedness gate**. Missing data → weight 0 (the subscore drops out; it does not score zero, and it does not fabricate credit).

```
block    = Σ(value · weight) / Σ(weight)
outcome  = (signal · 0.50 + reference · 0.50) · gate     gate is multiplicative
TOTAL    = Σ(block · block_weight) / Σ(block_weight)      outcome 0.50 / procedure 0.50
```

Outcome-quality subscores are **continuous** — each is a ratio to the deposit's own value computed the same way (`scoring.ratio_to_ceiling`), so the score is as version-robust as a band without throwing away resolution. Coarse **bands** (`scoring.count_band`) are kept only where the target is a genuinely discrete regime — a count, like Select-2D templates ≈ 2.

## Outcome — signal ⊕ reference (weight 0.50, × handedness gate)

Two halves, 50/50: **signal quality** scores the run's *own* reconstruction (no answer key); **reference consistency** scores agreement with the deposited EMD-6287.

### Signal quality — weight 0.50 (no reference)

Global resolution plus three orthogonal axes of how resolution varies: frequency, space, direction. Each is read from the run's own half-maps. Every axis is **continuous**, normalized against the deposit's own value computed the same way — the deposit (full particle set) leads, the runs use a 20-movie subset, so a run scores below 1 by exactly that subset gap.

| Subscore | Wt | Computes | Normalization | In runs |
|---|---|---|---|---|
| **global_resolution** <span class="pill ok">active</span> | 0.40 | half-map GSFSC@0.143 (Å) | `anchor / run` vs the 3.15 Å W1 same-subset anchor (deposit-matched is circular for resolution) | 3.11–3.18 Å → **0.99–1.0** |
| **fsc_curve** <span class="pill ok">active</span> | 0.20 | AUC of the half-map FSC curve (frequency) | `run_auc / deposit_auc`, deposit AUC truncated at the run's band | AUC 0.79–0.81 → **0.82–0.85** |
| **local_resolution** <span class="pill ok">active</span> | 0.20 | 5–95% spread of the windowed local-res map (spatial uniformity) | `deposit_spread / run_spread` | spread 0.73–0.80 Å → **0.74–0.81** |
| **anisotropy (cFAR)** <span class="pill ok">active</span> | 0.20 | 3DFSC conical FSC area ratio, 1.0 = isotropic (directional) | `run_cfar / deposit_cfar` | cFAR 0.93–0.94 → **0.97** |

All four are maps-only, from `grader_signal.py` — no particles, no cryoSPARC, no Phenix: half-map FSC (global resolution, FSC-curve AUC), windowed half-map FSC@0.143 over an Otsu molecule mask (local resolution), and the 3DFSC conical FSC (cFAR; 100 cones, 20° half-angle). One method scores the four runs, the by-hand W1, and the deposit. Per-run values incl. W1 + deposit: [benchmark](benchmark.html).

### Reference consistency — weight 0.50 (vs the deposit)

The normalizer is the **resolution-matched ceiling**: EMD-6287 is the full 2.8 Å dataset, the runs a ~3.1 Å subset, so each metric is divided by the deposit **low-passed to the run's own resolution** — never the 2.8 Å figure.

The PDB / map-to-model branch carries **0 headline weight** (the active reference is map-to-map vs the deposited map); it is computed and reported as a cross-check. The scored CC is **hand-consistent** — computed on the placed, hand-flipped map; the raw rotation-only CC is hand-blind and, because the deposit is stored in the opposite hand, scores a mirror higher than an honest run (mirror raw 0.77 > honest 0.50). The scored CC is computed on the placed, hand-flipped map and re-baselined at a 0.5 placement floor; the ceiling is computed in-frame. Honest-run CC normalizes to ~0.37. The placement floor is flagged for calibration.

### Divergence

`signal − reference`, reported, never weighted. In the runs: **0.29–0.31** (signal ~0.91, reference ~0.61). The gap is driven by the reference-CC placement floor (§ below), which is flagged for calibration — not by genuine outperformance.

## Procedure — weight 0.50

Decision quality vs the W1 golden *intent*, from the run's structured job-graph. Three groups: **trajectory 0.50** (the workflow the agent built + ran), **select-2D 0.25**, **particle-picks 0.25**. Two subscores await box-side compute — refine-stage CryoSift and picking F2 — and drop to 0 weight (trajectory : select-2D reweight 2 : 1). The select-2D templates subscore is a count banded by distance from the golden ≈ 2:

## How the scheme serves the RFP

The RFP asks for execution-graded environments with **named, weighted, computable subscores**, **held-out** ground truth, defenses against degenerate strategies, and a headline **below ceiling**.

- **Fairness rule.** Every reference number is recomputed by us under one method — for every map, including the deposit and every ceiling. The run's self-reported, mask-dependent resolution is not graded; the subset-ceiling guardrail normalizes to the deposit low-passed to each run's resolution.
- **Reward integrity.** The agent sees its own self-FSC and cryoSPARC plots; the deposited map + model and all agreement metrics are held out. Wishful masking is checked twice — held-out reference disagreement and the 0-weight mask-gap diagnostic. Signal quality is high for any internally-consistent map (a mirror included), so it is paired 50/50 with held-out reference and capped by the handedness gate. Most subscores are rule-based; the deferred refine-CryoSift and picking-F2 procedure signals are held-out learned signals, not part of the reward the agent sees.
- **Below ceiling.** Totals 0.677–0.880; outcome ~0.76, unsaturated.

| RFP requirement (quoted) | Where in the scheme |
|---|---|
| "**named, computable metric**" with "**normalization and direction**" | named subscores in `[0,1]`, higher = better, explicit normalization |
| returns "**named numeric subscores with weights**" | `score_run → {…named (value, weight)…}` |
| "how a **trajectory is reduced to a number**" | recursive weighted combination, outcome-dominated, gated |
| "guards against **degenerate strategies**"; "**visible vs held out**" | held-out reference agreement + handedness gate + the 0-weight mask-gap diagnostic |
| "how **ground truth is established**" | the published EMD-6287 / 6BDF deposit, recomputed under one method |
| "headline **below ceiling**" | totals < 1.0; outcome unsaturated |

Everything cryo-EM-specific (metrics, weights, the outcome/procedure split) is **our** instantiation of the RFP's generic categories, not an RFP citation.

**Provisional:** the local-res mask and window, and the conservative reference-CC placement floor, are calibration items; all weights are flagged, to be calibrated on a quality ladder then frozen; the local-res summary statistic (spread vs another reduction of the interval) is not yet fixed; the procedure block's refine-CryoSift and picking-F2 signals await box-side compute; train/test splits and an instance family are deferred for this single-instance POC.
