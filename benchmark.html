# Benchmark

Per-run, per-subscore results for the graded reconstruction runs. The scoring scheme is on the [Grader](grader.html) page. The runs are on the [Tasks](rollouts.html) page.

Each cell gives the raw measured quantity, with the normalized [0, 1] score in parentheses. Aggregate columns (total, outcome, procedure, and the sub-blocks) carry the normalized score only, and higher is always better. Runs without a grade under the current scheme are flagged in the name column with their scores left blank. A subscore with no data is marked n/a. The tables scroll sideways and the run column stays fixed.

<details class="gsec" open>
<summary><h2>Master Table</h2></summary>

Two views of the same columns. **Demo runs** are the tasks listed on the [Tasks](rollouts.html) page. **Complete list** adds every other run computed so far, for internal review.

The outcome scores use three reference points on the same 20-movie subset: a by-hand expert reconstruction sets the map-quality ceiling (1.0), a random-decisions run sets the floor (0.0), and the published deposit (EMD-6287 / PDB 6BDF) is a held-out reference above the subset ceiling.

<details class="gsec">
<summary><h2>Outcome · map quality</h2></summary>

Weight 0.50 within outcome. Four axes read from the run's own two half-maps and final volume, with no reference. Each is floor-to-ceiling normalized `(value − floor) / (ceiling − floor)`: ceiling = the by-hand expert on the same subset (1.0), floor = the random-decisions run on the same subset (0.0). The deposit (full data) is a reference point, not the normalizer.

**Measured**

| Subscore | Quantity | raw_easy | raw_realistic | _floor_ | _ceiling_ | _deposit_ |
|---|---|---|---|---|---|---|
| global resolution | half-map FSC@0.143, loose mask, Å | 3.16 | 3.16 | 4.35 | 3.15 | 2.74 |
| FSC-curve shape | half-map FSC area under curve | 0.79 | 0.80 | 0.72 | 0.79 | 0.88 |
| local resolution | local-res 5–95% interval, Å | 2.63–3.35 | 2.64–3.39 | 3.15–6.51 | 2.61–3.46 | 2.46–3.06 |
| · | spread (p95 − p05), Å | 0.73 | 0.75 | 3.36 | 0.85 | 0.59 |
| anisotropy | conical FSC area ratio (cFAR) | 0.936 | 0.933 | 0.848 | 0.936 | 0.965 |

**Normalized** (weight 0.50 within outcome)

| Subscore | Wt | raw_easy | raw_realistic | _floor_ |
|---|---|---|---|---|
| global resolution | 0.40 | 0.995 | 0.992 | 0.000 |
| FSC-curve shape | 0.20 | 1.000 | 1.000 | 0.000 |
| local resolution | 0.20 | 1.000 | 1.000 | 0.000 |
| anisotropy | 0.20 | 1.000 | 0.965 | 0.000 |
| **map quality** | | **0.998** | **0.990** | **0.000** |

</details>

<details class="gsec">
<summary><h2>Outcome · map similarity</h2></summary>

Weight 0.50 within outcome. Agreement with the deposited EMD-6287 map, each metric normalized to a **resolution-matched structure**: the deposit low-pass filtered to the run's own resolution, the closest a 20-movie subset could reach, computed with the same software and masking applied to both maps.

**Measured** (with the resolution-matched ceiling each is normalized against)

| Subscore | Quantity | raw_easy | raw_realistic | _ceiling (per run)_ |
|---|---|---|---|---|
| map–map CC | placed real-space CC vs deposit | 0.644 | 0.646 | 0.945 / 0.945 |
| map–map FSC@0.5 | map↔deposit FSC@0.5, Å | 3.53 | 3.53 | 3.01 / 3.01 |

**Normalized** (weight 0.50 within outcome)

| Subscore | Wt | raw_easy | raw_realistic |
|---|---|---|---|
| map–map CC | 0.50 | 0.364 | 0.368 |
| map–map FSC@0.5 | 0.50 | 0.852 | 0.853 |
| **map similarity** | | **0.608** | **0.610** |

The floor fails map similarity too: placed CC ≈ 0.00 and map↔deposit FSC@0.5 ≈ 54 Å give map similarity 0.038.

</details>

<details class="gsec">
<summary><h2>Procedure</h2></summary>

Weight 0.50. Decision quality from the run's job graph and interactive choices, independent of final resolution. Three subscores: trajectory 0.50, select-2D 0.25, particle picks 0.25. Trajectory splits into tree completeness (0.70) and tree similarity (0.30); select-2D into a template pass and a refine pass (0.50 each). The [Grader](grader.html) page groups select-2D and particle picks under an *interactive jobs* node; the flat weights here are how the scores reweight when a subscore drops out.

**Measured factors**

| Subscore | Factor(s) | raw_easy | raw_realistic |
|---|---|---|---|
| trajectory · tree completeness | capabilities covered (of 9) · ordering · completed-3D gate | 9/9 · ok · pass | 9/9 · ok · pass |
| trajectory · tree similarity | (extra + missing) job types / union vs tutorial | 0 + 1 / 22 | 2 + 7 / 24 |
| select-2D · template | templates kept (target ≈ 2) · mean CryoSift of kept | 2 · 2.12 | 14 · 2.26 |
| select-2D · refine | precision / recall of keep vs CryoSift good/bad | 1.00 / 0.89 | 1.00 / 1.00 |
| particle picks | precision / recall vs expert coordinates | 0.79 / 0.93 | 0.84 / 0.91 |

**Normalized** (weight 0.50)

| Subscore | Wt | raw_easy | raw_realistic |
|---|---|---|---|
| **↳ trajectory** | 0.50 | **0.986** | **0.887** |
| · tree completeness | 0.70 | 1.000 | 1.000 |
| · tree similarity | 0.30 | 0.955 | 0.625 |
| **↳ select-2D** | 0.25 | **0.830** | **0.500** |
| · template | 0.50 | 0.719 | 0.000 |
| · refine | 0.50 | 0.941 | 1.000 |
| **↳ particle picks** (F2) | 0.25 | **0.894** | **0.895** |
| **procedure** | | **0.924** | **0.792** |

</details>

<details class="gsec">
<summary><h2>Degraded-map controls</h2></summary>

Three deliberately degraded versions of the expert map (a wrong-hand mirror, added noise, and half particle density) graded through the same outcome pipeline. These are controls, not runs: single combined maps without half-maps, so the map-quality axes are not computed for them. They test the handedness gate and map similarity. The honest-run band is shown for comparison.

| Map | map–map CC → norm | map–map FSC@0.5 Å → norm | map similarity | gate | EMRinger → norm | CC_mask → norm | map–model FSC Å |
|---|---|---|---|---|---|---|---|
| _honest runs_ | 0.644–0.646 → 0.36–0.37 | 3.53 → 0.85 | 0.608–0.610 | 1.00 | 1.66–1.71 → 0.39–0.40 | 0.744–0.745 → 0.68–0.69 | 3.35 |
| degraded_noise | 0.531 → 0.12 | 4.22 → 0.71 | 0.42 | 1.00 | 1.33 → 0.31 | 0.681 → 0.54 | 3.62 |
| degraded_mirror | 0.120 → 0.00 | 22.01 → 0.14 | 0.07 | **0.00** | 0.16 → 0.04 | 0.130 → 0.00 | 23.64 |
| degraded_halfdensity | 0.380 → 0.00 | 90.97 → 0.03 | 0.02 | 1.00 | 0.76 → 0.18 | 0.421 → 0.00 | 48.48 |

The mirror map aligns better to the mirror of the reference, so the handedness gate caps its outcome to 0. The noise and half-density maps pass the gate but fall on map similarity and on the reported map-to-model metrics.

</details>
