# Benchmark

Per-run × per-subscore results for the four graded reconstruction rollouts. Every number is emitted by `recon_env.grade` to `runs/agent/grader/{grades.json, scorecard.md}` (raw scalars in `outcome/<run>.json`). The scheme that produces them: [grader](grader.html). The runs themselves, with full inputs and outputs: [rollouts](rollouts.html).

Each block is reported twice: **measured** (the raw quantity each subscore reads — Å, count, CC, AUC, cFAR) and **normalized into the block** (each measured value mapped to `[0, 1]` and combined by weight into the block total). Normalization happens only at the block total. A cell shown **n/a** returned **weight 0** for that run (no data — it drops out, it did not score zero). Deferred (0 headline weight) subscores are computed and reported, not folded into the total.

| **raw_easy** | agent writes `cryosparc-tools` | easy | 21 | 3.16 Å | [raw_tools/execute/v1](rollouts.html) |

## Outcome · signal quality

Weight 0.50 within outcome. Computed on the run's own reconstruction (no reference), all four axes from the half-maps alone — no particles, no cryoSPARC, no Phenix (`grader_signal.py`): global resolution and FSC-curve AUC from the gold-standard half-map FSC; local resolution from windowed half-map FSC@0.143 over an Otsu + largest-connected-component molecule mask (25 Å Hann window); cFAR from the 3DFSC conical FSC (100 cones, 20° half-angle). One method scores the four runs, the by-hand **W1**, and the deposit **EMD-6287**. The deposit used the full particle set; the runs use a 20-movie subset, so the deposit leads every axis and is the normalizer (ceiling).

**Measured** (W1 + deposit are reference rows, not graded runs)

| Subscore | Quantity | e2e_easy | raw_easy | e2e_hard | raw_realistic | _W1_ | _deposit_ |
|---|---|---|---|---|---|---|---|
| global_resolution | GSFSC@0.143 loose-mask, Å | 3.18 | 3.16 | 3.11 | 3.16 | 3.15 | 2.74 |
| fsc_curve | half-map FSC AUC | 0.80 | 0.79 | 0.81 | 0.80 | 0.79 | 0.88 |
| local_resolution | local-res 5–95% interval, Å | 2.56–3.35 | 2.63–3.35 | 2.60–3.39 | 2.64–3.39 | 2.61–3.46 | 2.46–3.06 |
| · | spread (p95−p05), Å | 0.79 | 0.73 | 0.80 | 0.75 | 0.85 | 0.59 |
| anisotropy | cFAR (3DFSC) | 0.932 | 0.936 | 0.942 | 0.933 | 0.936 | 0.965 |

global_resolution is the run-reported loose-mask GSFSC (`gsfsc_loosemask_0143_A`); the W1 value is the 3.15 Å same-subset anchor. local-res median (Å): e2e_easy 2.79 · raw_easy 2.81 · e2e_hard 2.75 · raw_realistic 2.81 · W1 2.80 · deposit 2.63.

**Normalized into the block** (weight 0.50 within outcome). global_resolution → `anchor/run` against the W1 3.15 Å same-subset anchor (deposit-matched is circular for resolution); fsc_curve → `run_auc / deposit_auc` (deposit AUC truncated at the run's band); local_resolution → `deposit_spread / run_spread`; anisotropy → `run_cfar / deposit_cfar`. The local-res interval is reported raw — spread is a provisional summary statistic, final choice pending.

| Subscore | wt | e2e_easy | raw_easy | e2e_hard | raw_realistic |
