# Benchmark

Per-run × per-subscore results for the four graded reconstruction rollouts. Every number is emitted by `recon_env.grade` to `runs/agent/grader/{grades.json, scorecard.md}` (raw scalars in `outcome/<run>.json`). The scheme that produces them: [grader](grader.html). The runs themselves, with full inputs and outputs: [rollouts](rollouts.html).

Each block is reported twice: **measured** (the raw quantity each subscore reads — Å, count, CC, AUC, cFAR) and **normalized into the block** (each measured value mapped to `[0, 1]` and combined by weight into the block total). Normalization happens only at the block total. A cell shown **n/a** returned **weight 0** for that run (no data — it drops out, it did not score zero). Deferred (0 headline weight) subscores are computed and reported, not folded into the total.

| Run | Action surface | Variant | Jobs | GSFSC loose-mask | Report |
|---|---|---|---|---|---|
| **raw_easy** | agent writes `cryosparc-tools` | easy | 21 | 3.16 Å | [raw_tools/execute/v1](rollouts.html) |
| **e2e_easy** | constrained job tools | easy | 22 | 3.18 Å | [end_to_end/easy/v1](rollouts.html) |
