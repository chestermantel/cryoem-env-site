# Benchmark

Per-run, per-subscore results for the graded reconstruction runs on T20S. The scoring scheme behind these numbers — every subscore and exactly how it is computed — is on the [Grader](grader.html) page; the runs themselves, with their prompts, job graphs, maps, and full reports, are on the [Tasks](rollouts.html) page.

Four end-to-end runs are graded, spanning the two action surfaces — the agent calls constrained pipeline jobs, or writes pipeline code directly — and two guidance levels (fully scaffolded, or tutorial-/brief-only). A random-decisions floor and a set of deliberately degraded maps are included as anchors and controls. Every subscore is a value in **[0, 1]**, higher = better; a cell shown **n/a** returned no data and dropped out of its block — its siblings absorb the weight — rather than scoring zero.

Each outcome block is reported twice: **measured** — the raw quantity the subscore reads (Å, correlation, area, ratio) — and **normalized** — that quantity mapped to [0, 1] and combined by weight into the block.

## The runs

| Run | Action surface | Guidance | Jobs | Resolution | Report |
|---|---|---|---|---|---|
| `e2e_easy` | constrained pipeline jobs | fully scaffolded | 22 | 3.18 Å | [Tasks](rollouts.html) |
| `raw_easy` | agent writes pipeline code | full catalog + guidance | 21 | 3.16 Å | [Tasks](rollouts.html) |
| `e2e_hard` | constrained pipeline jobs | tutorial only | 16 | 3.11 Å | [Tasks](rollouts.html) |
| `raw_realistic` | agent writes pipeline code | supervisor brief + tutorial | 17 | 3.16 Å | [report](reports/raw-realistic-exec-v2.html) |

Resolution is each run's own loose-mask gold-standard FSC at the 0.143 threshold, recomputed under one fixed mask for every map.

Three same-subset reference points anchor the outcome scores. **Ceiling** — an expert's by-hand reconstruction of the same 20 movies (≈3.15 Å); defines map quality 1.0. **Floor** — a minimal pipeline with random interactive decisions on the same movies (≈4.35 Å); defines map quality 0.0. **Deposit** — the published full-data reconstruction (EMD-6287, 2.8 Å) and atomic model (PDB 6BDF); a held-out reference above the subset ceiling, never the normalizer.

Outcome and procedure are weighted 0.50 / 0.50. Outcome = (map quality 0.50 + map similarity 0.50) × handedness gate. Runs are ordered by total; the random-decisions floor is the bottom anchor.

|---|---|---|---|---|---|---|
| `e2e_easy` | **0.870** | 0.798 | 0.979 | 0.616 | 1.00 | 0.942 |
| `raw_easy` | **0.864** | 0.803 | 0.998 | 0.608 | 1.00 | 0.924 |
| `e2e_hard` | **0.808** | 0.805 | 1.000 | 0.610 | 1.00 | 0.811 |
| `raw_realistic` | **0.796** | 0.800 | 0.990 | 0.610 | 1.00 | 0.792 |
| _floor (random decisions)_ | **0.288** | 0.019 | 0.000 | 0.038 | 1.00 | 0.558 |

## Outcome · map similarity

Weight 0.50 within outcome. Agreement with the deposited EMD-6287 map, each metric normalized to a **resolution-matched structure** — the deposit low-pass filtered to the run's own resolution, the closest a 20-movie subset could reach — computed with the same software and masking applied to both maps.

**Measured** (with the resolution-matched ceiling each is normalized against)

| Subscore | Quantity | e2e_easy | raw_easy | e2e_hard | raw_realistic | _ceiling (per run)_ |
|---|---|---|---|---|---|---|
| map–map CC | placed real-space CC vs deposit | 0.645 | 0.644 | 0.651 | 0.646 | 0.939 / 0.945 / 0.953 / 0.945 |
| map–map FSC@0.5 | map↔deposit FSC@0.5, Å | 3.53 | 3.53 | 3.47 | 3.53 | 3.03 / 3.01 / 2.96 / 3.01 |

**Normalized** (weight 0.50 within outcome)

| Subscore | Wt | e2e_easy | raw_easy | e2e_hard | raw_realistic |
|---|---|---|---|---|---|
| map–map CC | 0.50 | 0.373 | 0.364 | 0.366 | 0.368 |
| map–map FSC@0.5 | 0.50 | 0.859 | 0.852 | 0.854 | 0.853 |
| **map similarity** | | **0.616** | **0.608** | **0.610** | **0.610** |

The floor fails map similarity too — placed CC ≈ 0.00 and map↔deposit FSC@0.5 ≈ 54 Å → map similarity 0.038.

## Degraded-map controls

Three deliberately degraded versions of the expert map — a wrong-hand mirror, added noise, and half particle density — graded through the same outcome pipeline. These are controls, not runs: single combined maps without half-maps, so the map-quality axes are not computed for them; they test the handedness gate and map similarity. The honest-run band is shown for comparison.

| Map | map–map CC → norm | map–map FSC@0.5 Å → norm | map similarity | gate | EMRinger → norm | CC_mask → norm | map–model FSC Å |
|---|---|---|---|---|---|---|---|
| _four honest runs_ | 0.64–0.65 → 0.36–0.37 | 3.47–3.53 → 0.85–0.86 | 0.608–0.616 | 1.00 | 1.53–1.71 → 0.37–0.40 | 0.743–0.747 → 0.84 | 3.34–3.35 |
| degraded_noise | 0.531 → 0.12 | 4.22 → 0.71 | 0.42 | 1.00 | 1.33 → 0.31 | 0.681 → 0.77 | 3.62 |
| degraded_mirror | 0.120 → 0.00 | 22.01 → 0.14 | 0.07 | **0.00** | 0.16 → 0.04 | 0.130 → 0.15 | 23.64 |
| degraded_halfdensity | 0.380 → 0.00 | 90.97 → 0.03 | 0.02 | 1.00 | 0.76 → 0.18 | 0.421 → 0.48 | 48.48 |

The mirror map aligns better to the mirror of the reference, so the handedness gate caps its outcome to 0; the noise and half-density maps pass the gate but fall on map similarity and on the reported map-to-model metrics.
