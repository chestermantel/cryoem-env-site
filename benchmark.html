# Benchmark

Per-run × per-subscore results for the four graded reconstruction rollouts. Every number is emitted by `recon_env.grade` to `runs/agent/grader/{grades.json, scorecard.md}` (raw scalars in `outcome/<run>.json`). Subscore values are in `[0, 1]`, higher = better; each carries a weight. The scheme that produces them: [grader](grader.html). The runs themselves, with full inputs and outputs: [rollouts](rollouts.html).

Conventions: a subscore shown **n/a** returned **weight 0** (no data — it drops out of its block, it did not score zero). The three signal-quality axes other than global resolution are n/a pending the box-side compute (`grader_signal.py`, not yet run). Deferred (0 headline weight) subscores are computed and reported, not folded into the total.

## Runs

| Run | Action surface | Variant | Jobs | GSFSC loose-mask | Report |
|---|---|---|---|---|---|
| **raw_easy** | agent writes `cryosparc-tools` | easy | 21 | 3.16 Å | [raw_tools/execute/v1](rollouts.html) |
| **e2e_easy** | constrained job tools | easy | 22 | 3.18 Å | [end_to_end/easy/v1](rollouts.html) |
| **raw_realistic** | agent writes `cryosparc-tools` | realistic | 17 | 3.16 Å | [report](reports/raw-realistic-exec-v2.html) |
| **e2e_hard** | constrained job tools | hard | 16 | 3.11 Å | [end_to_end/hard/v1](rollouts.html) |

Golden reference: W1 by-hand, GSFSC ≈ 3.15 Å loose-mask, same 20-movie EMPIAR-10025 subset, D7. Ground-truth deposit: EMD-6287 (map) + PDB 6BDF (model).
