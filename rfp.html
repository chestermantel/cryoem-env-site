# T20S reconstruction environment — v0 specification

Drafted to the Anthropic RFP, *Evaluation Environments for Scientific Tasks* (May 2026). Instantiated for the public cryo-EM **tutorial MVP**: single-particle reconstruction of the **T20S proteasome** (EMPIAR-10025, 20-movie subset).

> **What this page is.** New Atlantic's v0 environment specification answering the Anthropic RFP, scoped to the tutorial MVP we have actually built and run. It follows the RFP's required sections (task · data · signals/scoring · reward integrity · baseline & golden path · difficulty · problem family · metadata · 4–6-week plan · data access). It is a **living draft** — the spec's demands and our coverage tighten as we collect more and better results. This copy is for internal review, so each section carries a **status line** (`built` / `partial` / `gap`) that would not appear in a customer-facing spec.

> **Our-instantiation vs the RFP (guardrail).** The RFP names **no framework** and prescribes execution-graded environments *generically* — named, weighted, computable subscores with held-out ground truth. Everything cryo-EM-specific here (the metrics, the weights, the tiers, the accessions, "outcome / procedure / integrity") is **our** instantiation, not an RFP citation. Where the RFP wording is load-bearing it is quoted.

---

## 1. Task definition

The agent drives a **complete single-particle cryo-EM reconstruction**: from raw electron-microscope movies to a refined 3D density map, on the T20S proteasome tutorial set. This is the full iterative pipeline a structural biologist runs, not an isolated step.

The continuous workflow the agent must execute:

```
import → motion-correct → CTF → (denoise) → blob-pick → inspect → extract → 2D classify
   → select templates → template-pick → inspect → extract → 2D classify → select refine
   → ab-initio (C1) → homogeneous refine (D7) → mask → validation → sharpen
```

It tracks the verbatim public cryoSPARC **Introductory Tutorial (T20S)**. Within it, **five steps are genuine interactive judgment calls** — everything else is procedurally fixed by the tutorial:

1. **Select-2D (templates)** — which 2D class averages become picking templates (golden: ~2, one top + one side view).
2. **Inspect picks (blob pass)** — NCC / power thresholds for junk rejection.
3. **Select-2D (refine)** — which classes feed the 3D refinement (golden: ~15 of 50).
4. **Inspect picks (template pass)** — second-pass thresholds.
5. **Mask threshold** — iso-level for the static mask used in validation.

Symmetry (D7) and particle diameter are **given by the tutorial — not interactive** at this tier.

**Input the agent receives.** Raw movies plus acquisition metadata (pixel size, voltage, Cs, dose, gain reference), and — depending on tier — the public tutorial text and/or a job-type catalog and API references. **Artifact it must produce.** A final 3D density map (`.mrc`) with its two half-maps, plus the realized job graph (job types, parameters, and intermediate outputs) that produced it.

**Action space — a realism ladder (built and run).** Two axes: *action surface* (constrained tools → the agent writing raw code) × *scaffolding* (easy → hard → realistic).

| Tier | Action surface | Variants | What the agent is given |
|---|---|---|---|
| **1 · Single-decision** | structured decision only (emit indices / thresholds / iso-level) | one task per decision (×5) | a faithful, **non-leaking** rendered observation + the tutorial's decision criteria; correct upstream state grafted in |
| **2 · End-to-end, constrained tools** | `create_job` / `run_job` / `get_results` / `inspect_*` | easy · hard | one prompt to **build + run** the whole DAG, every decision inline. easy = full catalog + params + guidance; hard = tutorial-only minimal catalog |
| **3 · Raw cryosparc-tools** | the agent **writes `cryosparc-tools` Python** (`run_python` over a persistent namespace) | easy · **realistic** | the public tutorial + public API only; phased build→execute. realistic = PI-style brief, agent discovers job types itself (`cs.print_job_types()`) and decides everything |

> **Status — tier built.** <span class="pill ok">built</span> All three tiers run live against a real cryoSPARC instance; 17 rollouts catalogued. The maximally-realistic tier-3 run reconstructed a map autonomously (discovered job types, drove interactive inspection via the job API, self-recovered a crashed cryoSPARC DB). <span class="pill partial">partial</span> Observations are rendered programmatically (PNG montages / pick overlays); a **frozen-observation snapshot** so a fixed benchmark replays without the live pipeline is not yet built.

## 2. Data

**Primary dataset.** EMPIAR-10025, T20S proteasome — the **20-movie subset** that is the cryoSPARC tutorial's own `downloadtest` set (Titan Krios, 300 kV, K2). Acquisition parameters (task-intrinsic, version-pinned): pixel **0.6575 Å**, **300 kV**, Cs **2.7 mm**, dose **53 e/Å²**, gain `norm-amibox05-0.mrc`, symmetry **D7**.

**Ground truth — two references, used for two different jobs:**

| Reference | What | Used for |
|---|---|---|
| **In-house golden — W1 by-hand** | the same 20-movie subset, run by hand to ~**3.15 Å** loose-mask GSFSC, D7 | the **resolution / particle-count band anchor** (same subset → apples-to-apples) and the **procedure** reference |
| **Held-out deposited — EMD-6287 + PDB 6BDF** | the published full-dataset **2.8 Å** T20S reconstruction + re-refined atomic model, D7 (+ deposited half-maps) | **structural correctness** ("did it build the right structure"), held out from the agent |

**Measurement model / how ground truth is established.** The deposited map and model come from the published, peer-reviewed T20S reconstruction pipeline; we recompute every agreement metric ourselves from half-maps under **one fixed engine and procedure** for every map *including the deposited reference* (the cryoAgent fairness rule) — never comparing a number we computed against a number a paper printed.

**Splits the environment needs (RFP).** *Held-out:* the deposited EMD-6287/6BDF structural answer key (§4). *Perturbed/resampled:* a **degraded-map suite** (wrong-hand mirror, fewer particles / half-density, added noise, over-loose mask) used to prove the scorer drops monotonically. *External / cross-source (transfer):* a harder public EMPIAR instance, then the Scripps tier-3 system (§10) — the **same structural workflow** across all tiers.

> **Guardrails (verified — do not violate).** (a) **Subset ceiling** — our runs use 20 movies (~3.1 Å ceiling); a run must **not** be penalized for not reaching the 2.8 Å full-dataset figure (band against W1, never 2.8 Å). (b) The accession is **EMD-6287 / 6BDF, *not* 3J9I** (a different T20S deposition). (c) **Never** grade T20S runs against the Scripps HIV-Env / VRC01 maps in `ChimeraX/` — a different system.

> **Status.** <span class="pill ok">built</span> Primary dataset staged; W1 golden + half-maps verified; deposited map/model/half-maps confirmed present. <span class="pill gap">gap</span> Stable, named **train/test splits** (RFP) are deliberately **deferred** for this single-instance POC — flagged in §11.

## 3. Feedback signals and scoring

The environment returns **named, computable subscores in three blocks** — each a number in `[0,1]` with a stated direction, *not* a qualitative judgment. The signals an agent legitimately sees during interaction (its own half-map FSC, counts, cryoSPARC plots) are distinct from the **held-out** agreement metrics used only for final scoring (§4).

### Outcome block — did it build the right structure (held out)

| Subscore | Measures | Direction | Normalization |
|---|---|---|---|
| **Structure agreement (CC vs golden)** — *primary* | real-space correlation of the run's map to the W1 golden map, after a coarse-to-fine SO(3) alignment | higher better | ceiling = golden-vs-golden = 1.0 |
| **Deposited agreement (CC vs EMD-6287)** — *supporting* | correlation to the deposited map | higher better | normalized to the golden-vs-deposited ceiling (~0.50, resolution-limited — subset ceiling honored) |
| **Handedness gate** | enantiomer (mirror) CC vs golden — catches wrong-hand maps | gate | **multiplicative**: wrong hand caps the outcome to ~0 |
| **EMRinger / map-model CC** — *deferred* | side-chain register & map-model agreement vs 6BDF | higher better | weight 0 until supplied (see §11) |

### Procedure block — was the science done correctly (computable off structured fields)

| Subscore | Golden | Banding |
|---|---|---|
| **Select-2D templates count** | 2 | band around 2; heavy penalty for gross over-selection (hard kept 29, realistic 14) — the single highest-signal procedural flag |
| **Select-2D refine count** | 15 of 50 | band around 15 |
| **Symmetry** | D7 at refine, C1 at ab-initio | exact-match |
| **Box size** | 440 px | band; flag anomalies |
| **Picker diameters** | tutorial values | band |
| **Stage completeness** | denoise · junk · mask-gen · validation · sharpen | partial credit per expected stage; penalize skips |
| **Particle-count trajectory** | ~12.7k→11k→9.5k *shape* | each stage within a band of golden shape (not exact counts — version-sensitive) |
| **Pick curation** | auto-calibrated (~0.41 NCC) | thresholds not absurdly loose + downstream kept-fraction |

### Integrity block — is the headline honest (§4)

| Subscore | Measures | Direction |
|---|---|---|
| **Over-fit / mask gap** | self-FSC inflation from a too-tight mask vs the corrected curve | smaller gap better |

**Reduction — full trajectory → one number.** The RFP-sanctioned "weighted combination of signals": a weighted sum of the named subscores, **outcome-dominated**, with provisional block weights **outcome 0.50 / procedure 0.35 / integrity 0.15** (the handedness gate is multiplicative). Procedure carries real weight on purpose: in scientific RL, *correct procedure is part of the ground truth*, and on this well-behaved instance the outcome is near-saturated, so the procedure block is what discriminates.

**Current headline scorecard** (`runs/agent/grader/scorecard.md`):

| Run | TOTAL | outcome | procedure | integrity | the procedural tell |
|---|---|---|---|---|---|
| raw_easy | **0.99** | 0.98 | 1.00 | 1.0 | clean: 2 templates, 16 classes |
| e2e_easy | **0.98** | 0.99 | 0.96 | 1.0 | 2 templates, 19 classes |
| raw_realistic | **0.89** | 0.99 | 0.71 | 1.0 | **14 templates**, no denoise, mask failed |
| e2e_hard | **0.87** | 0.97 | 0.68 | 1.0 | **29 templates**, skipped denoise + mask-gen |

> **Status.** <span class="pill ok">built</span> Outcome (map-to-map + handedness), procedure, and integrity blocks implemented in `scoring.py` (the harness-agnostic IP) and produce the scorecard above. <span class="pill gap">gap</span> The map-to-**model** outcome (EMRinger / CC_mask vs 6BDF) is deferred — `dock_in_map` did not converge on the 46k-atom D7 assembly within budget; flagged as the top next step. <span class="pill partial">partial</span> Weights are explicit but **provisional**, to be frozen after calibration on the degraded-map suite.

## 4. Reward integrity

- **Visible to the agent during interaction:** its own half-map GSFSC, the cryoSPARC plots, intermediate particle counts — everything a working scientist legitimately sees.
- **Held out for final scoring:** the deposited **EMD-6287 map + 6BDF model** and every agreement metric computed against them. The agent never reads the answer key.
- **Main gaming vector — "wishful masking" / over-fitting:** a too-tight mask inflates the self-reported FSC while the map disagrees with the truth. **Defense:** the held-out map agreement (and the within-run tight-vs-corrected mask gap, §3 integrity) catch this structurally — a wishfully-masked map scores worse on the held-out outcome even when its self-FSC looks great.
- **State the agent must not read or alter:** the deposited reference files, the grading code, any cached golden key.
- **Core reward is rule-based and computable — no learned reward model, no LLM-judge** (both gameable). An LLM-judge or the non-leaking observation PNGs may be a *separate, optional QC signal*, never in the core.

> **Status.** <span class="pill ok">built</span> Held-out outcome + mask-gap integrity term implemented; sensitivity validated (`validation.md`): wrong-hand mirror → hand-gate **0.0**; heavy noise → 0.91; half-density → 0.35; real runs 0.95–0.97.

## 5. Baseline and golden path

**Golden path.** The **W1 by-hand expert trajectory** — a structural biologist driving the full cryoSPARC pipeline to ~3.15 Å, with the exact job graph and parameters recorded (`docs/golden-path.md`). This is both the reference trajectory an agent is graded against and the source of the procedure golden values.

**Baselines the agent should beat.**
- **Rigid programmatic pipeline** (`reconstruction_pipeline.py`) — "dumb automation" that runs the DAG with fixed heuristics and no judgment. A floor reference.
- **The naive resolution-only grader** — the in-sample-reasonable baseline that *fails the robustness signal*: it rates every run ~equal because all four reach 3.11–3.18 Å, and so **cannot rank decision quality**. The environment's whole point is to beat this — the quality headline separates runs the resolution number conflates.

> **Status.** <span class="pill ok">built</span> Golden path run, recorded, and reproduced programmatically (matches by-hand). <span class="pill partial">partial</span> The rigid pipeline exists as a floor; it is not yet wired into the scorecard as a labelled baseline row.

---

## 6. Difficulty

The RFP asks the headline to sit **meaningfully below ceiling**. Here the subtlety *is* the difficulty: the **naive metric (resolution) is saturated** — every end-to-end run reaches ~golden resolution (3.11–3.18 Å) regardless of decision quality — but the **real quality headline is not**. The procedure and integrity terms keep the sloppy runs (`e2e_hard` 0.87, `raw_realistic` 0.89) visibly below the clean runs (`raw_easy` 0.99, `e2e_easy` 0.98).

The cleanest evidence of non-triviality: **`e2e_hard` kept 29 templates (should be ~2) and skipped denoise + mask generation, yet posted the *best* resolution (3.11 Å).** A model can reach a good-looking number while doing poor science — and the grader catches it. This is an environment where headroom lives in *judgment*, not in the final scalar.

> **Status.** <span class="pill ok">built</span> The saturation-vs-discrimination result is demonstrated and is the grader's reason to exist. <span class="pill gap">gap</span> Headroom is currently shown across *scaffolding* (easy vs hard/realistic); a harder *instance* that pushes even clean-procedure runs below ceiling on outcome is future work (§7, §10).

---

## 7. Problem family

**Today: a single fixed instance** (T20S / EMPIAR-10025, 20-movie subset) — valuable as a held-out eval, with a **within-instance perturbation family** already built (the degraded-map suite: mirror / low-N / noise / mask).

**Proposed family** (for training value): a parameterized manifold of instances **{dataset × start-tier × perturbation}** — multiple EMPIAR datasets, the pipeline entered at different stages (raw movies vs pre-computed particles), and systematic perturbations. Instances would be enumerated by a generator script (the RFP's "manifest of problem instances generated by a script you write").

> **Status.** <span class="pill gap">gap</span> Family is specified, not yet formalized or enumerated. Per-decision variance also unmeasured — cryoSPARC is stochastic and runs are single-shot; each interactive decision should be repeated ~5× to characterize the distribution, not a single draw.

---

## 8. Metadata

- **Expected human completion time (one instance):** roughly a half to a full working day for a trained user end-to-end (interactive steps + queue/compute waits); the compute itself is GPU-hours.
- **Difficulty tier (relative to current models):** medium. Frontier models reach a golden-class *map* but make materially sub-optimal *judgment* calls — the gap the grader measures.
- **Grading approach:** **hybrid, programmatic-dominant** — computable map-agreement + structured-field procedure checks; no LLM-judge in the core.
- **What bad performance looks like (failure modes the env exposes):**

| Failure mode | Signature | Caught by |
|---|---|---|
| Over-selecting 2D templates | 14–29 templates kept vs ~2 | procedure: select-2D templates |
| Skipping pipeline stages | no denoise / no mask-gen / no validation | procedure: stage completeness |
| Under-curating picks | NCC/power thresholds left far too loose | procedure: pick curation |
| Wishful masking | inflated self-FSC, disagreement with truth | integrity gap + held-out outcome |
| Wrong handedness | mirrored map | outcome: handedness gate → ~0 |
| Right answer, wrong science | golden resolution via a bad procedure | the procedure block (the headline finding) |

## 10. Data access (tiered)

Runnable **from day one on public data**, with a tiered path to the encumbered data where the real value is:

1. **Day-one public (no agreement):** T20S / EMPIAR-10025 + the deposited EMD-6287 / 6BDF answer key — all public, fetched from EMPIAR/EMDB/RCSB. The entire MVP runs on this.
2. **Light credentialing:** a harder public EMPIAR instance to extend the difficulty/transfer ladder (to be selected).
3. **DUA-gated (the moat):** the Scripps tier-3 system — the non-public reconstruction pipeline data (raw micrographs → particle selections → maps → model-building/refinement logs, parameters, provenance) behind a *published* paper, ~20 TB. The **same structural workflow** scales from the public T20S anchor to this tier — public tier-1 and DUA tier-3 are the same kind of pipeline, so the environment generalizes along one continuous workflow.

> **Status.** <span class="pill ok">built</span> Tier-1 fully public and runnable. <span class="pill gap">gap</span> Tier-2 instance unselected; tier-3 gated on the pilot DUA.

## How this proposal evaluates itself

The RFP scores proposals on two criteria.

- **Technical feasibility.** Demonstrated, not promised: the environment is **already built and run end-to-end** on obtainable public data, with computable metrics, an implemented scorer, and a real baseline — all on a single cloud GPU instance.
- **Scientific merit.** The task is the genuine iterative reconstruction loop a structural biologist runs, graded against a **published, validated** answer key, with a held-out outcome that confirms *the right structure was built* and a procedure layer that measures *whether the science was done well* — the difference a resolution number hides. A model that scores well here is genuinely more useful for the underlying research problem.

---

## Deliverable — what we build toward

Per the RFP's "what you will eventually build": a **containerized environment with two hooks** — a *setup* function returning the task prompt + materials, and a *grading* function returning **named numeric subscores with weights** — plus an instance manifest from a generator script, a data-fetch step, a trivial baseline, and stable train/test splits.

Current mapping: `scoring.py` is the harness-agnostic grading IP (`score_run → {subscores, total, bands}`); `inspect_tasks.py` is a thin adapter; the run drivers are the setup/rollout surface. The scoring module is kept **framework-agnostic** so it survives a harness port.

---

## Open questions — what will change as results improve

This is the part most likely to move; it is why the page is a draft.

- **Map-to-model outcome** (EMRinger / CC_mask vs 6BDF) — add the side-chain-register interpretability bar once model docking is made reliable (detached/on-box `dock_in_map`, or seeded single-ASU docking).
- **Weights** — freeze the 0.50 / 0.35 / 0.15 blocks (and within-block weights) after calibration on the degraded-map suite.
- **Train/test splits & instance family** — formalize {dataset × start-tier × perturbation} and enumerate via a manifest script.
- **Per-decision variance** — repeat each interactive decision ~5× to grade the *distribution*, not a single stochastic draw.
- **Harder transfer instance** — pick the specific harder public EMPIAR dataset(s) for tier-2.
- **Frozen-observation snapshots** — capture rendered observations so a fixed benchmark replays without the live pipeline.
- **cFAR / anisotropy** — optional for D7 T20S (weak discriminator); revisit for lower-symmetry instances.
- **Baseline rows** — wire the rigid pipeline and the naive resolution-only grader in as explicit scorecard rows.
